<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LoopTap</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="recorder-panel">
        <div class="topbar">
          <div>
            <h1>LoopTap</h1>
            <p>一键录制电脑正在播放的声音，不录麦克风。</p>
          </div>
          <div id="statePill" class="state-pill">准备就绪</div>
        </div>

        <div class="meter-card">
          <div class="time" id="timer">00:00:00</div>
          <div class="level">
            <span id="levelBar"></span>
          </div>
          <div class="status" id="statusText">选择格式后点击开始录制。</div>
        </div>

        <div class="controls">
          <label class="field">
            <span>导出格式</span>
            <select id="formatSelect">
              {% for key, label in formats.items() %}
                <option value="{{ key }}">{{ label }}</option>
              {% endfor %}
            </select>
          </label>

          <div class="actions">
            <button id="startButton" class="primary">开始录制</button>
            <button id="stopButton" class="danger" disabled>停止并保存</button>
          </div>
        </div>

        <div class="download" id="downloadBox" hidden>
          <div>
            <strong>录音已保存</strong>
            <span id="fileMeta"></span>
          </div>
          <a id="downloadLink" href="#" download>下载音频</a>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
