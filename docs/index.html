<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LoopTap Web</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <header class="header">
          <div>
            <p class="eyebrow">LoopTap Web</p>
            <h1>网页端电脑音频录制</h1>
            <p class="intro">无需安装。通过浏览器共享标签页、窗口或屏幕音频，录制后直接下载。</p>
          </div>
          <a class="repo-link" href="https://github.com/haonnan1987/looptap-recorder">GitHub</a>
        </header>

        <div class="notice">
          纯网页受浏览器安全限制，不能直接调用 Windows WASAPI。开始录制后，请在浏览器弹窗中选择包含声音的标签页/窗口/屏幕，并勾选共享音频。
        </div>

        <section class="recorder">
          <div class="timer" id="timer">00:00:00</div>
          <div class="meter"><span id="meterBar"></span></div>
          <p class="status" id="statusText">准备就绪</p>

          <div class="controls">
            <label>
              <span>导出格式</span>
              <select id="formatSelect">
                <option value="wav">WAV PCM</option>
                <option value="webm">WebM Opus</option>
              </select>
            </label>
            <button id="startButton">开始录制</button>
            <button id="stopButton" disabled>停止并生成下载</button>
          </div>
        </section>

        <section class="download" id="downloadBox" hidden>
          <div>
            <strong>录音已生成</strong>
            <span id="fileMeta"></span>
          </div>
          <a id="downloadLink" href="#" download>下载音频</a>
        </section>

        <section class="tips">
          <h2>使用建议</h2>
          <ul>
            <li>Chrome / Edge 选择“标签页”并勾选“共享标签页音频”最稳定。</li>
            <li>如果需要真正的系统级内录、FLAC、24-bit WAV，请使用 GitHub 仓库里的本地版。</li>
            <li>录音在浏览器本地生成，不会上传到服务器。</li>
          </ul>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
